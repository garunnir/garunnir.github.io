<style>
:root {
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #555;
  --color-text-tertiary: #888;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f5;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.25);
  --font-sans: system-ui, sans-serif;
  --font-mono: monospace;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
}
</style>
<style>
  .panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .tab-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { padding: 6px 14px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
  .section { display: none; }
  .section.active { display: block; }
  label { font-size: 13px; color: var(--color-text-secondary); }
  .val { font-weight: 500; color: var(--color-text-primary); min-width: 36px; display: inline-block; text-align: right; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .badge-blue { background: #B5D4F4; color: #0C447C; }
  .badge-amber { background: #FAC775; color: #633806; }
  .badge-teal { background: #9FE1CB; color: #085041; }
  .badge-coral { background: #F5C4B3; color: #712B13; }
  .badge-gray { background: #D3D1C7; color: #444441; }
  .eq { font-family: var(--font-mono); font-size: 13px; background: var(--color-background-secondary); padding: 8px 12px; border-radius: var(--border-radius-md); margin: 8px 0; color: var(--color-text-primary); }
  .note { font-size: 12px; color: var(--color-text-secondary); margin-top: 6px; }
  @media (prefers-color-scheme: dark) {
    .badge-blue { background: #0C447C; color: #B5D4F4; }
    .badge-amber { background: #633806; color: #FAC775; }
    .badge-teal { background: #085041; color: #9FE1CB; }
    .badge-coral { background: #712B13; color: #F5C4B3; }
    .badge-gray { background: #444441; color: #D3D1C7; }
  }
</style>

<div class="tab-row">
  <button class="tab active" onclick="showTab('geometry')">① XZ 평면 기하</button>
  <button class="tab" onclick="showTab('fixedpoint')">② 고정점 수렴</button>
  <button class="tab" onclick="showTab('simulation')">③ 반복 시뮬레이션</button>
  <button class="tab" onclick="showTab('stability')">④ 안정성 조건</button>
</div>

<!-- TAB 1: Geometry -->
<div id="tab-geometry" class="section active">
  <svg width="100%" viewBox="0 0 680 360" role="img">
    <title>XZ 평면에서 카메라 시스템 기하 구조</title>
    <desc>플레이어 P, 카메라 C, 조준점 A(C), 목표 D(C)의 관계를 나타내는 다이어그램</desc>
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Ground plane grid (XZ) -->
    <rect x="40" y="40" width="600" height="280" rx="12" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <text class="ts" x="56" y="62" fill="var(--color-text-tertiary)">XZ 평면 (Y 고정)</text>

    <!-- Grid lines subtle -->
    <line x1="40" y1="200" x2="640" y2="200" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 6"/>
    <line x1="340" y1="40" x2="340" y2="320" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="4 6"/>

    <!-- Ray from camera to A(C) through screen center -->
    <line x1="220" y1="110" x2="480" y2="270" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arr)"/>
    <text class="ts" x="330" y="165" text-anchor="middle" fill="#0F6E56">화면 중심 레이</text>

    <!-- P: Player (fixed) -->
    <circle cx="340" cy="220" r="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <text class="th" x="340" y="224" text-anchor="middle" fill="#185FA5" font-size="12">P</text>
    <text class="ts" x="340" y="248" text-anchor="middle" fill="#185FA5">플레이어 (고정)</text>

    <!-- C: Camera -->
    <circle cx="220" cy="110" r="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
    <text class="th" x="220" y="114" text-anchor="middle" fill="#993C1D" font-size="12">C</text>
    <text class="ts" x="220" y="88" text-anchor="middle" fill="#993C1D">카메라 위치</text>

    <!-- A(C): Raycast hit point -->
    <circle cx="480" cy="270" r="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <text class="th" x="480" y="274" text-anchor="middle" fill="#0F6E56" font-size="11">A(C)</text>
    <text class="ts" x="480" y="296" text-anchor="middle" fill="#0F6E56">레이캐스트 교점</text>

    <!-- D(C): Target -->
    <circle cx="395" cy="185" r="9" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>

    <text class="ts" x="430" y="175" text-anchor="start" fill="#854F0B">카메라 목표</text>

    <text class="ts" x="442" y="222" fill="#0F6E56">w</text>

    <rect x="50" y="270" width="180" height="60" rx="6" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <text class="ts" x="62" y="288" fill="var(--color-text-secondary)">D(C) = (1-w)·(P+off) + w·(A(C)+off)</text>
    <text class="ts" x="62" y="304" fill="var(--color-text-secondary)">     = base + w·A(C)</text>
    <text class="ts" x="62" y="320" fill="var(--color-text-secondary)">w = 0.32 (aimLeadWeight)</text>
  </svg>
</div>

<!-- TAB 2: Fixed Point -->
<div id="tab-fixedpoint" class="section">
  <svg width="100%" viewBox="0 0 680 340" role="img">
    <title>고정점 도출 과정</title>
    <desc>A(C)의 선형 근사를 대입하여 고정점 C*를 구하는 과정</desc>
    <defs>
      <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Step boxes vertical -->
    <!-- Step 1 -->
    <g>
      <rect x="50" y="30" width="580" height="52" rx="8" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
      <text class="ts" x="70" y="52" fill="var(--color-text-secondary)">① A(C)의 선형 근사</text>
      <text class="ts" x="70" y="72" fill="var(--color-text-primary)" font-family="var(--font-mono)">A(C) ≈ M·C + b    (카메라 Δ이동 → 조준점 Δ이동, 국소적으로 선형)</text>
    </g>
    <line x1="340" y1="82" x2="340" y2="102" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr2)"/>

    <!-- Step 2 -->
    <g>
      <rect x="50" y="102" width="580" height="52" rx="8" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
      <text class="ts" x="70" y="124" fill="var(--color-text-secondary)">② 목표식에 대입</text>
      <text class="ts" x="70" y="144" fill="var(--color-text-primary)" font-family="var(--font-mono)">D(C) = base + w·(M·C + b) = k + (w·M)·C</text>
    </g>
    <line x1="340" y1="154" x2="340" y2="174" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr2)"/>

    <!-- Step 3 -->
    <g>
      <rect x="50" y="174" width="580" height="52" rx="8" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
      <text class="ts" x="70" y="196" fill="var(--color-text-secondary)">③ 정상 상태 조건: C* = D(C*)</text>
      <text class="ts" x="70" y="216" fill="var(--color-text-primary)" font-family="var(--font-mono)">C* = k + (w·M)·C*   →   (I - w·M)·C* = k</text>
    </g>
    <line x1="340" y1="226" x2="340" y2="246" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arr2)"/>

    <!-- Step 4: fixed point result (highlighted) -->
    <g>
      <rect x="50" y="246" width="580" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
      <text class="ts" x="70" y="268" fill="#085041">④ 고정점 해 (역행렬 존재 시)</text>
      <text class="th" x="340" y="294" text-anchor="middle" fill="#085041" font-family="var(--font-mono)" font-size="15">C* = (I − w·M)⁻¹ · k</text>
    </g>
    <text class="ts" x="340" y="324" text-anchor="middle" fill="var(--color-text-secondary)">→ 무한히 표류하지 않고 유한한 위치에 수렴</text>
  </svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'simulation' && !window.simChartInst) initSimChart();
}

let simChartInst = null;

function initSimChart() {
  const ctx = document.getElementById('simChart').getContext('2d');
  simChartInst = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{
      label: 'C (카메라 위치)',
      data: [],
      borderColor: '#D85A30',
      backgroundColor: 'rgba(216,90,48,0.08)',
      borderWidth: 2,
      pointRadius: 3,
      tension: 0.3,
      fill: false
    }, {
      label: 'D(C) (목표)',
      data: [],
      borderColor: '#1D9E75',
      backgroundColor: 'rgba(29,158,117,0.06)',
      borderWidth: 1.5,
      borderDash: [4,4],
      pointRadius: 2,
      tension: 0.3,
      fill: false
    }]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { title: { display: true, text: '프레임', font: { size: 11 } }, ticks: { color: '#888' } },
        y: { title: { display: true, text: '위치', font: { size: 11 } }, ticks: { color: '#888' } }
      }
    }
  });
  updateSim();
}

function updateSim() {
  const w = document.getElementById('wSlider').value / 100;
  const M = document.getElementById('mSlider').value / 100;
  const C0 = parseFloat(document.getElementById('c0Slider').value);

  document.getElementById('wVal').textContent = w.toFixed(2);
  document.getElementById('mVal').textContent = M.toFixed(2);
  document.getElementById('c0Val').textContent = C0;

  const wM = w * M;
  document.getElementById('specRadius').textContent = wM.toFixed(3);

  const converges = wM < 1;
  const statusEl = document.getElementById('convergeStatus');
  statusEl.textContent = converges ? '✓ 수렴' : '✗ 발산';
  statusEl.style.color = converges ? '#1D9E75' : '#E24B4A';

  const k = 10; const b = 5;
  const base = 30;

  if (converges) {
    const cStar = (base + w * b) / (1 - wM);
    document.getElementById('fixedPt').textContent = cStar.toFixed(2);
  } else {
    document.getElementById('fixedPt').textContent = '∞ (발산)';
  }

  if (!simChartInst) return;

  const frames = 40;
  const labels = Array.from({length: frames}, (_, i) => i);
  const cData = [], dData = [];
  let C = C0;

  for (let i = 0; i < frames; i++) {
    const A = M * C + b;
    const D = base + w * A;
    cData.push(parseFloat(C.toFixed(2)));
    dData.push(parseFloat(D.toFixed(2)));
    // SmoothDamp approximation: move 30% toward target per frame
    const alpha = 0.3;
    C = C + alpha * (D - C);
    if (Math.abs(C) > 2000) { C = Math.sign(C) * 2000; }
  }

  simChartInst.data.labels = labels;
  simChartInst.data.datasets[0].data = cData;
  simChartInst.data.datasets[1].data = dData;
  simChartInst.update('none');
}
</script>
